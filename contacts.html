<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты - Dota 2 Guide</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <h1>Dota 2: Мир легендарной MOBA</h1>
    <nav>
      <ul>
        <li><a href="index.html">Главная</a></li>
        <li><a href="gallery.html">Галерея</a></li>
        <li><a href="contacts.html" class="active">Контакты</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Связь с авторами проекта</h2>
    
    <div class="contacts-wrapper">
      
      <section class="contact-card">
        <div class="avatar-container">
          <img src="123.webp" alt="Фото авторов" class="avatar">
        </div>
        <div class="contact-info">
          <h3>Андрей</h3>
          <p class="subtitle">Студенты 1 курса • Группа 1ИП-3</p>
          <hr style="margin: 15px 0; border: none; border-bottom: 1px solid #eee;">
          <p><i class="fas fa-envelope" style="color: #e50000;"></i> Email: Sobolev20052006@gmail.com</p>
          <p><i class="fas fa-map-marker-alt" style="color: #e50000;"></i> Локация: Россия, г.Москва аккадемия Миллионщикова</p>
          
          <div class="social-links">
            <a href="#" class="social-icon"><i class="fab fa-telegram"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-vk"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
          </div>
        </div>
      </section>

      <section class="contact-form-container">
        <h3>Оставить отзыв / задать вопрос</h3>
        <form action="#" method="POST" onsubmit="alert('Форма успешно отправлена!'); this.reset(); return false;">
          
          <div class="form-group">
            <label for="name">Ваше имя *</label>
            <input type="text" id="name" class="form-control" placeholder="Введите имя" required>
          </div>

          <div class="form-group">
            <label for="email">Ваш Email *</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
          </div>

          <div class="form-group">
            <label for="subject">Тема</label>
            <input type="text" id="subject" class="form-control" placeholder="Например: Предложение">
          </div>

          <div class="form-group">
            <label for="message">Сообщение *</label>
            <textarea id="message" class="form-control" rows="4" placeholder="Ваш текст..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">Отправить сообщение</button>
        </form>
      </section>

    </div>
  </main>

  <footer>
    <p>© Соболев Андрей</p>
  </footer>
</body>
</html>
