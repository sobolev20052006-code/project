<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея Героев - Dota 2 Guide</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <h1>Dota 2: Мир легендарной MOBA</h1>
    <nav>
      <ul>
        <li><a href="index.html">Главная</a></li>
        <li><a href="gallery.html" class="active">Галерея</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Галерея персонажей</h2>
    
    <div class="controls-panel">
      <div class="stats">
        <span class="stat-item"><i class="fas fa-images"></i> Героев на экране: <span id="image-counter">0</span></span>
        <span class="stat-item"><i class="fas fa-heart"></i> Всего лайков: <span id="total-likes">0</span></span>
      </div>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">Все роли</button>
      <button class="filter-btn" data-filter="carry">Керри</button>
      <button class="filter-btn" data-filter="mid">Мидеры</button>
      <button class="filter-btn" data-filter="support">Поддержка</button>
    </div>

    <div class="gallery-grid" id="image-gallery">
      
      <article class="image-card" data-category="carry">
        <div class="card-image">
          <img src="images/ant.png" alt="Герой Anti-Mage">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">Anti-Mage</h3>
          <div class="image-tags"><span class="tag">Carry</span></div>
        </div>
      </article>

      <article class="image-card" data-category="mid">
        <div class="card-image">
          <img src="images/invo.png" alt="Герой Invoker">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">Invoker</h3>
          <div class="image-tags"><span class="tag">Midlane</span></div>
        </div>
      </article>

      <article class="image-card" data-category="support">
        <div class="card-image">
          <img src="images/drow.png" alt="Герой drowranger">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">drowranger</h3>
          <div class="image-tags"><span class="tag">Support</span></div>
        </div>
      </article>

      <article class="image-card" data-category="carry">
        <div class="card-image">
          <img src="images/sf.png" alt="sf">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">sf</h3>
          <div class="image-tags"><span class="tag">Carry</span></div>
        </div>
      </article>

      <article class="image-card" data-category="mid">
        <div class="card-image">
          <img src="images/mag.png" alt="Герой Magnus">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">Magnus</h3>
          <div class="image-tags"><span class="tag">Midlane</span></div>
        </div>
      </article>

      <article class="image-card" data-category="support">
        <div class="card-image">
          <img src="images/pu.jpeg" alt="Герой Pudge">
          <div class="image-overlay">
            <button class="like-btn">
              <i class="far fa-heart"></i> <span class="like-count">0</span>
            </button>
          </div>
        </div>
        <div class="card-content">
          <h3 class="image-title">Pudge</h3>
          <div class="image-tags"><span class="tag">Support</span></div>
        </div>
      </article>

    </div>
  </main>

  <footer>
    <p>© Соболев Андрей 2026 год</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
